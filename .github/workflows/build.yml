name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.beatbox --project-name beatbox_music temp_app
          rm -rf temp_app/lib
          cp -r lib temp_app/lib
          cp pubspec.yaml temp_app/pubspec.yaml

      - name: Configure Android
        run: |
          mkdir -p temp_app/android/app/src/main/res/xml
          cat > temp_app/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

          MANIFEST="temp_app/android/app/src/main/AndroidManifest.xml"

          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>|' "$MANIFEST"

          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"

          sed -i 's|</application>|    <service android:name="com.ryanheise.audioservice.AudioService" android:foregroundServiceType="mediaPlayback" android:exported="true">\n        <intent-filter>\n            <action android:name="android.media.browse.MediaBrowserService"/>\n        </intent-filter>\n    </service>\n    <receiver android:name="com.ryanheise.audioservice.MediaButtonReceiver" android:exported="true">\n        <intent-filter>\n            <action android:name="android.intent.action.MEDIA_BUTTON"/>\n        </intent-filter>\n    </receiver>\n</application>|' "$MANIFEST"

      - name: Get dependencies
        run: |
          cd temp_app
          flutter pub get

      - name: Build APK
        run: |
          cd temp_app
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BeatBox-APK
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
